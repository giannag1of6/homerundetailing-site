<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HomeRun Detailing</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    header {
      padding: 40px 20px;
    }
    h1 {
      font-size: 3rem;
      color: #7dd3fc;
      margin-bottom: 10px;
    }
    .section {
      padding: 40px 20px;
    }
    .card {
      background: #1e293b;
      margin: 15px auto;
      padding: 20px;
      border-radius: 15px;
      max-width: 400px;
    }
    .button {
      display: inline-block;
      margin-top: 15px;
      padding: 12px 20px;
      background: #7dd3fc;
      color: #0f172a;
      text-decoration: none;
      border-radius: 999px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <header>
    <h1>HomeRun Detailing</h1>
    <p>Premium car detailing in Columbus, Ohio</p>
    <a class="button" href="#contact">Get a Quote</a>
  </header>

  <div class="section">
    <h2>Services</h2>
    <div class="card">
      <h3>Exterior Detail</h3>
      <p>Starting at $99</p>
    </div>
    <div class="card">
      <h3>Interior Detail</h3>
      <p>Starting at $119</p>
    </div>
    <div class="card">
      <h3>Full Detail</h3>
      <p>Starting at $189</p>
    </div>
  </div>

  <div class="section" id="contact">
    <h2>Contact</h2>
    <p>Call or text: Your Number Here</p>
    <p>Email: your@email.com</p>
  </div>
</body>
</html>
